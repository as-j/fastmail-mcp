# Default server configuration
#
upstream house {
	keepalive 10;
	#server local.cban.com:8889;
	server 192.168.129.2:8888;
}

server {

	server_name house.cban.com;

	location / {
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-Server $host;
		proxy_set_header X-Forwarded-Proto https;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		# Default is HTTP/1, keepalive is only enabled in HTTP/1.1
		proxy_http_version 1.1;
		proxy_set_header Connection "";
		proxy_read_timeout     300;
		proxy_connect_timeout  300;
		proxy_pass https://house;
	} 

	location ^~ /.well-known/acme-challenge/ {
		root /var/www/html;
		default_type "text/plain";
		try_files $uri =404;
	}


    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/house.cban.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/house.cban.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = house.cban.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot



	server_name house.cban.com;

	listen 80;
	listen [::]:80;
    return 404; # managed by Certbot


}
