server {
    listen 443 ssl;
    server_name mcp.geekfarmlife.com;

    ssl_certificate     /etc/letsencrypt/live/mcp.geekfarmlife.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.geekfarmlife.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Required for SSE (MCP streaming) — nginx must not buffer the event stream
    proxy_buffering    off;
    proxy_cache        off;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Keep-alive for SSE streams
        proxy_set_header   Connection        '';
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

server {
    listen 80;
    server_name mcp.geekfarmlife.com;
    return 301 https://$host$request_uri;
}
